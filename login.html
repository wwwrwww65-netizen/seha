<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - صحة</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Cairo', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #d6eaf8 0%, #e8f4fd 40%, #c8e6f5 70%, #b0d9f0 100%);
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        /* Soft background blobs */
        body::before {
            content: '';
            position: fixed;
            top: -100px;
            left: -100px;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(100, 181, 246, 0.25) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
        }

        body::after {
            content: '';
            position: fixed;
            bottom: -80px;
            right: -80px;
            width: 350px;
            height: 350px;
            background: radial-gradient(circle, rgba(126, 87, 194, 0.18) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
        }

        .login-wrapper {
            width: 100%;
            max-width: 440px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 28px;
        }

        /* Page Title */
        .page-title {
            font-size: 2.4rem;
            font-weight: 900;
            color: #1a1a2e;
            text-align: center;
            letter-spacing: -0.5px;
        }

        /* Login Card */
        .login-card {
            width: 100%;
            background: #ffffff;
            border-radius: 22px;
            padding: 36px 32px;
            box-shadow:
                0 4px 24px rgba(100, 150, 220, 0.12),
                0 1px 4px rgba(100, 150, 220, 0.08);
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* Form field group */
        .field-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .field-label {
            font-size: 0.92rem;
            font-weight: 600;
            color: #444;
            text-align: right;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .form-input {
            width: 100%;
            padding: 13px 16px;
            padding-left: 46px;
            border: 1.5px solid #e0e8f5;
            border-radius: 12px;
            font-family: 'Cairo', sans-serif;
            font-size: 0.95rem;
            color: #888;
            background: #f8fbff;
            outline: none;
            transition: border-color 0.25s, box-shadow 0.25s, background 0.25s;
            text-align: right;
            direction: ltr;
        }

        .form-input::placeholder {
            color: #aab8cc;
            direction: ltr;
        }

        .form-input:focus {
            border-color: #29b6d6;
            background: #ffffff;
            box-shadow: 0 0 0 3px rgba(41, 182, 214, 0.12);
        }

        .input-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #29b6d6;
            display: flex;
            align-items: center;
            pointer-events: none;
        }

        /* Login Button */
        .btn-login {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 50px;
            background: linear-gradient(90deg, #29b6d6 0%, #7c4dff 100%);
            color: #fff;
            font-family: 'Cairo', sans-serif;
            font-size: 1.08rem;
            font-weight: 700;
            cursor: pointer;
            letter-spacing: 0.3px;
            transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
            box-shadow: 0 4px 18px rgba(100, 100, 220, 0.25);
            margin-top: 4px;
        }

        .btn-login:hover {
            opacity: 0.92;
            transform: translateY(-1px);
            box-shadow: 0 6px 22px rgba(100, 100, 220, 0.35);
        }

        .btn-login:active {
            transform: translateY(0);
            opacity: 1;
        }

        /* Footer help text */
        .help-text {
            font-size: 0.86rem;
            color: #888;
            text-align: center;
            line-height: 1.7;
        }

        .help-text a {
            color: #29b6d6;
            text-decoration: none;
            font-weight: 600;
        }

        .help-text a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="login-wrapper">

        <!-- Page Title -->
        <h1 class="page-title">تسجيل الدخول</h1>

        <!-- Login Card -->
        <div class="login-card">

            <!-- Email Field -->
            <div class="field-group">
                <label class="field-label" for="email">البريد الإلكتروني</label>
                <div class="input-wrapper">
                    <input
                        type="email"
                        id="email"
                        class="form-input"
                        placeholder="you@example.com"
                        autocomplete="email"
                    >
                    <span class="input-icon">
                        <!-- Mail Icon -->
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
                            <rect x="2" y="4" width="20" height="16" rx="2"/>
                            <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
                        </svg>
                    </span>
                </div>
            </div>

            <!-- Password Field -->
            <div class="field-group">
                <label class="field-label" for="password">كلمة المرور</label>
                <div class="input-wrapper">
                    <input
                        type="password"
                        id="password"
                        class="form-input"
                        placeholder="••••••••"
                        autocomplete="current-password"
                    >
                    <span class="input-icon">
                        <!-- Lock Icon -->
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                        </svg>
                    </span>
                </div>
            </div>

            <!-- Login Button -->
            <button class="btn-login" id="login-btn" type="button">تسجيل الدخول</button>

        </div>



    </div>

    <script src="db.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            await DB.redirectIfLoggedIn();
            
            document.getElementById("login-btn").addEventListener("click", async function() {
                const email = document.getElementById("email").value.trim();
                const pass = document.getElementById("password").value.trim();
                
                if(!email || !pass) {
                    alert("يرجى إدخال البريد الإلكتروني وكلمة المرور.");
                    return;
                }

                const loginResult = await DB.login(email, pass);
                if(loginResult === 'success') {
                    window.location.href = "dashboard";
                } else if(loginResult === 'inactive') {
                    alert("عذراً، هذا الحساب موقوف حالياً. يرجى مراجعة إدارة النظام.");
                } else {
                    alert("بيانات الدخول غير صحيحة! يرجى المحاولة مرة أخرى.");
                }
            });
        });
    </script>
</body>
</html>
