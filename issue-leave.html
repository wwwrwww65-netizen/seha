<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إصدار إجازة جديدة - صحة</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            min-height: 100%;
        }

        body {
            font-family: 'Cairo', sans-serif;
            /* خلفية متدرجة فاتحة كما في الصورة */
            background: linear-gradient(135deg, #d6eaf8 0%, #e8f4fc 25%, #dceef7 50%, #cfe4f2 75%, #c5ddef 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 28px 16px 50px;
            direction: rtl;
        }

        /* ---- Card ---- */
        .card {
            background: #ffffff;
            border-radius: 18px;
            width: 100%;
            max-width: 380px;
            padding: 26px 22px 28px;
            box-shadow:
                0 4px 24px rgba(80, 130, 190, 0.12),
                0 1px 6px rgba(80, 130, 190, 0.08);
            transition: max-width 0.3s ease, padding 0.3s ease;
        }

        /* ---- Title ---- */
        .card-header {
            text-align: right;
            margin-bottom: 20px;
        }

        .card-title {
            font-size: 1.5rem;
            font-weight: 900;
            color: #1a202c;
            margin-bottom: 5px;
            line-height: 1.3;
        }

        .card-subtitle {
            font-size: 0.80rem;
            color: #8096ab;
            font-weight: 500;
            line-height: 1.65;
        }

        /* ---- Field group ---- */
        .form-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px 20px;
        }

        .field-label {
            display: block;
            font-size: 0.82rem;
            font-weight: 700;
            color: #2d3a4a;
            margin-bottom: 5px;
            text-align: right;
        }

        /* ---- Base input ---- */
        .form-input,
        .form-select {
            width: 100%;
            padding: 10px 13px;
            background: #f2f7fc;
            border: 1.5px solid #e0eaf4;
            border-radius: 9px;
            font-family: 'Cairo', sans-serif;
            font-size: 0.86rem;
            color: #3a4a5c;
            outline: none;
            text-align: right;
            direction: rtl;
            transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
            appearance: none;
            -webkit-appearance: none;
        }

        .form-input::placeholder {
            color: #b0c4d8;
            font-family: 'Cairo', sans-serif;
            font-size: 0.84rem;
        }

        .form-input:focus,
        .form-select:focus {
            border-color: #2ab6cc;
            background: #fff;
            box-shadow: 0 0 0 3px rgba(42, 182, 204, 0.13);
        }

        /* ---- Select (dropdown) ---- */
        .select-wrapper {
            position: relative;
        }

        .form-select {
            cursor: pointer;
            padding-left: 34px;
            color: #3a4a5c;
        }

        .select-arrow {
            position: absolute;
            left: 11px;
            top: 50%;
            transform: translateY(-50%);
            pointer-events: none;
            color: #8099b0;
            display: flex;
            align-items: center;
        }

        /* ---- Date input wrapper (for calendar icon) ---- */
        .date-wrapper {
            position: relative;
        }

        .date-wrapper .form-input {
            padding-left: 38px;
        }

        .date-icon {
            position: absolute;
            left: 11px;
            top: 50%;
            transform: translateY(-50%);
            color: #93b5cc;
            pointer-events: none;
            display: flex;
            align-items: center;
        }

        /* Date input styling */
        input[type="date"] {
            color: #b0c4d8;
        }

        input[type="date"]:valid {
            color: #3a4a5c;
        }

        input[type="date"]::-webkit-calendar-picker-indicator {
            opacity: 0;
            position: absolute;
            left: 0;
            width: 38px;
            height: 100%;
            cursor: pointer;
        }

        input[type="date"]::-webkit-datetime-edit {
            color: #b0c4d8;
        }

        input[type="date"]::-webkit-datetime-edit-fields-wrapper {
            color: #b0c4d8;
        }

        /* ---- Submit Button ---- */
        .btn-submit-container {
            text-align: right;
            margin-top: 18px;
        }

        .btn-submit {
            display: inline-block;
            padding: 11px 30px;
            border: none;
            border-radius: 50px;
            background: linear-gradient(90deg, #1fc8dc 0%, #17afc3 100%);
            color: #fff;
            font-family: 'Cairo', sans-serif;
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            letter-spacing: 0.2px;
            transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
            box-shadow: 0 4px 16px rgba(23, 175, 195, 0.35);
        }

        .btn-submit:hover {
            opacity: 0.92;
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(23, 175, 195, 0.45);
        }

        .btn-submit:active {
            transform: translateY(0);
            opacity: 1;
        }

        /* ========================
           RESPONSIVE DESIGN
        ======================== */
        @media (min-width: 768px) {
            body {
                align-items: center; /* توسيط الكارت عمودياً في الشاشات الكبيرة */
            }

            .card {
                max-width: 750px;
                padding: 40px 35px;
            }

            .card-header {
                text-align: center;
                margin-bottom: 30px;
            }

            .card-title {
                font-size: 1.8rem;
            }

            .card-subtitle {
                font-size: 0.95rem;
            }

            .form-grid {
                grid-template-columns: 1fr 1fr; /* عمودين على شاشة الكمبيوتر */
            }

            .btn-submit-container {
                text-align: center; /* توسيط زر الحفظ */
                margin-top: 25px;
            }

            .btn-submit {
                padding: 12px 50px;
                font-size: 1.05rem;
            }
        }
    </style>
</head>
<body>

    <div class="card">

        <!-- زر للرجوع للوحة التحكم -->
        <div style="text-align: left; margin-bottom: 10px;">
            <a href="dashboard.html" style="text-decoration: none; font-size: 0.85rem; font-weight: 700; color: #1fc8dc; display: inline-flex; align-items: center; gap: 5px;">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
                الرجوع للوحة التحكم
            </a>
        </div>

        <!-- العنوان -->
        <div class="card-header">
            <h1 class="card-title">إصدار إجازة جديدة</h1>
            <p class="card-subtitle">أملأ الحقول التالية لحفظ بيانات الإجازة المختصرة.</p>
        </div>

        <div class="form-grid">
            <!-- نوع الإجازة -->
            <div class="field-group">
                <label class="field-label" for="leave-type">نوع الإجازة</label>
                <div class="select-wrapper">
                    <select class="form-select" id="leave-type">
                        <option value="private">قطاع خاص</option>
                        <option value="government">قطاع حكومي</option>
                    </select>
                    <span class="select-arrow">
                        <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
                            <polyline points="6 9 12 15 18 9"/>
                        </svg>
                    </span>
                </div>
            </div>

            <!-- الاسم -->
            <div class="field-group">
                <label class="field-label" for="full-name">الاسم</label>
                <input type="text" id="full-name" class="form-input" placeholder="الاسم الكامل">
            </div>

            <!-- رمز الخدمة (معرف الإجازة) -->
            <div class="field-group">
                <label class="field-label" for="leave-id">رمز الخدمة (معرف الإجازة)</label>
                <input type="text" id="leave-id" class="form-input" placeholder="اتركه فارغاً للتوليد التلقائي">
            </div>

            <!-- رقم الهوية/الإقامة -->
            <div class="field-group">
                <label class="field-label" for="id-number">رقم الهوية/الإقامة</label>
                <input type="text" id="id-number" class="form-input" placeholder="XXXXXXXXXX">
            </div>

            <!-- تاريخ إصدار التقرير -->
            <div class="field-group">
                <label class="field-label" for="report-date">تاريخ إصدار التقرير</label>
                <div class="date-wrapper">
                    <input type="date" id="report-date" class="form-input" placeholder="اختر تاريخاً">
                    <span class="date-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" width="17" height="17" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
                            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
                            <line x1="16" y1="2" x2="16" y2="6"/>
                            <line x1="8" y1="2" x2="8" y2="6"/>
                            <line x1="3" y1="10" x2="21" y2="10"/>
                        </svg>
                    </span>
                </div>
            </div>

            <!-- تبدأ من -->
            <div class="field-group">
                <label class="field-label" for="start-date">تبدأ من</label>
                <div class="date-wrapper">
                    <input type="date" id="start-date" class="form-input" placeholder="اختر تاريخاً">
                    <span class="date-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" width="17" height="17" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
                            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
                            <line x1="16" y1="2" x2="16" y2="6"/>
                            <line x1="8" y1="2" x2="8" y2="6"/>
                            <line x1="3" y1="10" x2="21" y2="10"/>
                        </svg>
                    </span>
                </div>
            </div>

            <!-- و حتى -->
            <div class="field-group">
                <label class="field-label" for="end-date">و حتى</label>
                <div class="date-wrapper">
                    <input type="date" id="end-date" class="form-input" placeholder="اختر تاريخاً">
                    <span class="date-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" width="17" height="17" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
                            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
                            <line x1="16" y1="2" x2="16" y2="6"/>
                            <line x1="8" y1="2" x2="8" y2="6"/>
                            <line x1="3" y1="10" x2="21" y2="10"/>
                        </svg>
                    </span>
                </div>
            </div>

            <!-- اسم الطبيب -->
            <div class="field-group">
                <label class="field-label" for="doctor-name">اسم الطبيب</label>
                <input type="text" id="doctor-name" class="form-input" placeholder="اسم الطبيب المعالج">
            </div>

            <!-- المسمى الوظيفي -->
            <div class="field-group">
                <label class="field-label" for="job-title">المسمى الوظيفي</label>
                <input type="text" id="job-title" class="form-input" placeholder="المسمى الوظيفي">
            </div>

            <!-- أسم المرافق -->
            <div class="field-group">
                <label class="field-label" for="companion-name">أسم المرافق</label>
                <input type="text" id="companion-name" class="form-input" placeholder="اسم الشخص المرافق">
            </div>

            <!-- صلة القرابة -->
            <div class="field-group">
                <label class="field-label" for="relation">صلة القرابة</label>
                <input type="text" id="relation" class="form-input" placeholder="صلة القرابة مع المريض">
            </div>
            
        </div> <!-- end form-grid -->

        <!-- زر الحفظ -->
        <div class="btn-submit-container">
            <button class="btn-submit" id="save-btn" type="button">حفظ البيانات</button>
        </div>

    </div>

    <script src="db.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", async () => {
            await DB.requireAuth();

            // ------ 1. Pre-fill dates ------
            const today = new Date();
            const yyyy = today.getFullYear();
            const mm = String(today.getMonth() + 1).padStart(2, '0');
            const dd = String(today.getDate()).padStart(2, '0');
            const todayStr = `${yyyy}-${mm}-${dd}`;

            const dateFields = ["report-date", "start-date", "end-date"];
            
            dateFields.forEach(id => {
                const el = document.getElementById(id);
                if(el) el.value = todayStr;
            });

            // ------ 2. Check if editing ------
            const urlParams = new URLSearchParams(window.location.search);
            const editId = urlParams.get('id');

            if(editId) {
                try {
                    const leave = await DB.getLeave(editId);
                    if(leave) {
                    document.getElementById('leave-type').value = leave.type || 'private';
                    document.getElementById('full-name').value = leave.name || '';
                    document.getElementById('leave-id').value = leave.id || '';
                    document.getElementById('id-number').value = leave.idNumber || '';
                    document.getElementById('report-date').value = leave.reportDate || todayStr;
                    document.getElementById('start-date').value = leave.startDate || todayStr;
                    document.getElementById('end-date').value = leave.endDate || todayStr;
                    document.getElementById('doctor-name').value = leave.doctor || '';
                    document.getElementById('job-title').value = leave.job || '';
                    document.getElementById('companion-name').value = leave.companion || '';
                    document.getElementById('relation').value = leave.relation || '';
                    
                    document.getElementById('leave-id').readOnly = true;
                }
                } catch(e) {}
            }

            // ------ 3. Save Data ------
            document.getElementById("save-btn").addEventListener("click", async () => {
                let passedId = document.getElementById('leave-id').value.trim();
                // Because checking existence requires a round trip, we rely on the backend to throw an error on duplicate IDs.

                const leaveData = {
                    id: passedId,
                    type: document.getElementById('leave-type').value,
                    name: document.getElementById('full-name').value,
                    idNumber: document.getElementById('id-number').value,
                    reportDate: document.getElementById('report-date').value,
                    startDate: document.getElementById('start-date').value,
                    endDate: document.getElementById('end-date').value,
                    doctor: document.getElementById('doctor-name').value,
                    job: document.getElementById('job-title').value,
                    companion: document.getElementById('companion-name').value,
                    relation: document.getElementById('relation').value
                };

                try {
                    await DB.saveLeave(leaveData);
                    
                    const btn = document.getElementById("save-btn");
                    btn.textContent = "تم الحفظ بنجاح ✓";
                    btn.style.background = "#48bb78";
                    
                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 800);
                } catch(error) {
                    alert(error.message);
                }
            });
        });
    </script>
</body>
</html>
